<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Monopoly PIX - Bank</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            background: #c9dbf8;
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 600px;
            padding: 12px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        input,
        select {
            padding: 10px;
            margin: 4px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            background: #2d6cdf;
            color: white;
            border: none;
            border-radius: 8px;
            margin: 4px;
            padding: 10px 14px;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.98);
        }

        .row {
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center
        }

        .danger {
            color: red;
        }

        .ok {
            color: green;
        }

        .title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="app">
        <div class="title">Banco - Monopoly PIX</div>


        <!-- ===================== GAME CONTROL ===================== -->
        <div class="card">
            <div class="title">Jogo</div>
            <div class="box">
                <div class="row">
                    <button onclick="saveGame()">Salvar</button>
                    <button onclick="loadGame()">Carregar</button>
                    <button onclick="newGame()">Novo Jogo</button>
                </div>
            </div>
        </div>


        <!-- ===================== CREATE PLAYER ===================== -->
        <div class="card">
            <div class="title">Criar jogador</div>
            <input id="playerName" placeholder="nome (a-z)">
            <input id="initialBalance" type="number" placeholder="saldo inicial">
            <button onclick="createPlayer()">Criar</button>
        </div>


        <!-- ===================== PLAYERS LIST ===================== -->
        <div class="card">
            <div class="title">Jogadores</div>
            <div class="box" id="players"></div>
        </div>


        <!-- ===================== TRANSFER ===================== -->
        <div class="card">
            <div class="title">Transferir dinheiro</div>
            <div class="box">
                <select id="from"></select>
                →
                <select id="to"></select>
                <input id="amount" type="number" placeholder="Valor">
                <button onclick="transfer()">Enviar PIX</button>
            </div>
        </div>


        <!-- ===================== LAST TRANSACTION ===================== -->
        <div class="card">
            <div class="title">Última transação</div>
            <div class="box" id="lastTransaction">Nenhuma</div>
        </div>


        <!-- ===================== STATUS ===================== -->
        <div id="status"></div>

        <!-- ================== WS STATUS ===================== -->
        <div id="wsStatus" style="padding:8px;text-align:center;font-size:12px;">
            Conectando...
        </div>

    </div>

    <script>

        let state = {};
        let ws;


        // ======================================================
        // INIT
        // ======================================================

        function init() {
            setWSStatus('connecting');
            connectWS();
        }


        // ======================================================
        // WEBSOCKET
        // ======================================================

        function connectWS() {
            ws = new WebSocket(`ws://${location.host}`);

            ws.onopen = () => {
                setWSStatus('connected');
            };

            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                if (data.type === 'GAME_STATE') {
                    state = data.payload;
                    render();
                }
            };

            ws.onerror = (err) => {
                console.error('WebSocket error', err);
                setWSStatus('disconnected');
            };

            ws.onclose = () => {
                setWSStatus('disconnected');
                setTimeout(connectWS, 1000);
            };
        }


        // ======================================================
        // API HELPERS
        // ======================================================

        async function api(url, method = 'GET', body) {

            const res = await fetch(url, {
                method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: body ? JSON.stringify(body) : undefined
            });

            return res.json();
        }


        // ======================================================
        // ACTIONS
        // ======================================================

        async function createPlayer() {

            const name = document.getElementById('playerName').value;
            const initialBalance = Number(document.getElementById('initialBalance').value);

            const res = await api('/api/player', 'POST', {
                name,
                initialBalance
            });

            showStatus(res.error || 'Jogador criado');
        }

        async function transfer() {

            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const amount = Number(document.getElementById('amount').value);

            const res = await api('/api/transfer', 'POST', {
                from,
                to,
                amount
            });

            showStatus(res.error || 'PIX enviado');
        }

        async function releaseDevice(playerName) {

            if (!confirm(
                `Liberar o acesso do jogador "${playerName}"?`
            )) {
                return;
            }

            const res = await api(
                `/api/player/${playerName}/release-device`,
                'POST'
            );

            if (res.error) {
                showStatus(res.error);
            } else {
                showStatus(
                    `Aparelho liberado para ${playerName}`
                );
            }
        }

        async function saveGame() {
            await api('/api/game/save', 'POST');
            showStatus('Jogo salvo');
        }

        async function loadGame() {
            await api('/api/game/load', 'POST');
            showStatus('Jogo carregado');
        }

        async function newGame() {
            await api('/api/game/new', 'POST');
            showStatus('Novo jogo iniciado');
        }


        // ======================================================
        // RENDER
        // ======================================================

        function render() {

            if (!state.players) return;

            renderPlayers();
            renderDropdowns();
            renderLastTransaction();
        }


        function renderPlayers() {

            const div = document.getElementById('players');

            div.innerHTML = state.players.map(p => `

        <div class="row"
             style="
                display:flex;
                align-items:center;
                gap:10px;
                margin-bottom:8px;
             ">

            <span style="flex:1;">
                <b>${p.name}</b> : ${formatMoney(p.balance)}
                ${p.deviceToken ? '🟢' : '⚪'}                
            </span>

            <button onclick="releaseDevice('${p.name}')">
                Liberar aparelho
            </button>

        </div>

    `).join('');
        }


        function renderDropdowns() {

            const from = document.getElementById('from');
            const to = document.getElementById('to');

            const options = [
                `<option value="bank">BANCO</option>`,
                ...state.players.map(p =>
                    `<option value="${p.name}">${p.name}</option>`
                )
            ].join('');

            from.innerHTML = options;
            to.innerHTML = options;
        }


        function renderLastTransaction() {

            const div = document.getElementById('lastTransaction');

            const allTx = state.transactions || [];

            if (allTx.length === 0) {
                div.innerHTML = 'Nenhuma transação';
                return;
            }

            const tx = allTx[allTx.length - 1];

            div.innerHTML = `
        <div>
            <b>${tx.from}</b> → <b>${tx.to}</b><br>
            ${formatMoney(tx.amount)}<br>
            ${tx.timestamp}
        </div>
    `;
        }

        function formatMoney(value) {
            return Number(value).toLocaleString('pt-BR');
        }


        // ======================================================
        // STATUS
        // ======================================================

        function showStatus(msg) {

            const div = document.getElementById('status');

            div.innerHTML = `<p>${msg}</p>`;

            setTimeout(() => {
                div.innerHTML = '';
            }, 4000);
        }

        function setWSStatus(status) {
            console.log("Status:", status)
            const el = document.getElementById('wsStatus');
            if (!el) return;

            if (status === 'connected') {
                el.innerHTML = '🟢 Conectado';
                el.style.color = 'green';
            } else if (status === 'disconnected') {
                el.innerHTML = '🔴 Desconectado (tentando reconectar...)';
                el.style.color = 'red';
            } else {
                el.innerHTML = '🟡 Conectando...';
                el.style.color = 'orange';
            }
        }

        // start
        init();

    </script>

</body>

</html>
